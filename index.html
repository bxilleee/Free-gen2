<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Generator Dashboard</title>
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --primary: #8b5cf6; 
            --danger: #ef4444; --border: #27272a; --text: #fafafa; --text-dim: #a1a1aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { 
            background: var(--bg); color: var(--text); 
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom);
        }
        header { text-align: center; padding: 30px 0 20px 0; }
        h1 { font-size: 24px; font-weight: 800; }
        .section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; margin-bottom: 20px;
        }
        h2 { font-size: 14px; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: var(--primary); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        textarea, input {
            width: 100%; background: #000; border: 1px solid var(--border);
            border-radius: 14px; color: white; padding: 15px; font-size: 16px; outline: none; margin-bottom: 10px;
        }
        textarea { height: 120px; resize: none; }
        button {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 15px; border-radius: 14px; font-weight: bold; font-size: 16px; cursor: pointer;
        }
        button:active { opacity: 0.8; }
        .btn-red { background: var(--danger); width: auto; padding: 0 20px; }
        .row { display: flex; gap: 10px; }
        .history-list { max-height: 200px; overflow-y: auto; }
        .item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .item:last-child { border: none; }
        .item-user { font-weight: bold; font-size: 15px; }
        .item-time { font-size: 12px; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <h1>Bot Dashboard</h1>
    </header>

    <div class="section">
        <h2>Stock Manager <span class="badge" id="stockCount">Loading...</span></h2>
        <textarea id="stockInput" placeholder="user:pass&#10;user2:pass2"></textarea>
        <button onclick="addStock()">Add Stock</button>
    </div>

    <div class="section">
        <h2>Blacklist User</h2>
        <div class="row">
            <input type="number" id="blInput" placeholder="User ID">
            <button class="btn-red" onclick="blacklistUser()">Ban</button>
        </div>
    </div>

    <div class="section">
        <h2>Recent Claims</h2>
        <div class="history-list" id="historyBox">
            <p style="text-align:center; color:gray;">Loading history...</p>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                document.getElementById('stockCount').innerText = `${data.stockCount} left`;
                
                const historyBox = document.getElementById('historyBox');
                historyBox.innerHTML = '';
                if(data.claimHistory.length === 0) historyBox.innerHTML = '<p style="text-align:center; color:gray;">No claims yet.</p>';
                
                data.claimHistory.forEach(log => {
                    historyBox.innerHTML += `
                        <div class="item">
                            <span class="item-user">@${log.user}</span>
                            <span class="item-time">${log.time}</span>
                        </div>
                    `;
                });
            } catch (e) { console.log("Failed to load data"); }
        }

        async function addStock() {
            const val = document.getElementById('stockInput').value;
            if(!val) return;
            await fetch('/api/add-stock', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({items: val}) });
            document.getElementById('stockInput').value = '';
            alert('Stock Added!');
            loadData();
        }

        async function blacklistUser() {
            const val = document.getElementById('blInput').value;
            if(!val) return;
            await fetch('/api/blacklist', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({userId: val}) });
            document.getElementById('blInput').value = '';
            alert('User Blacklisted!');
            loadData();
        }

        loadData();
        setInterval(loadData, 10000); // Refresh every 10 seconds
    </script>
</body>
</html>
